<!DOCTYPE html>
<html>
<head>
    <title>Рахунок</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #eee; padding: 40px; display: flex; justify-content: center; }
        .receipt { 
            background: white; 
            padding: 20px; 
            width: 300px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h1 { margin-top: 0; border-bottom: 2px dashed #333; padding-bottom: 10px; }
        .item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.1em; }
        .total { border-top: 2px dashed #333; padding-top: 10px; margin-top: 20px; font-weight: bold; font-size: 1.3em; display: flex; justify-content: space-between; }
        
        .btn-pay { 
            display: block; 
            background: #27ae60; 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 5px; 
            font-family: sans-serif;
            font-weight: bold;
        }
        .btn-back { display: block; margin-top: 10px; color: #777; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="receipt">
        <h1>Стіл № {{ table }}</h1>
        <p>Ресторан ДОБРИНЯ</p>
        <p>{{ items|length }} позицій</p>
        <hr style="border: 0; border-bottom: 1px solid #ddd;">

        {% for item in items %}
        <div class="item">
            <span>{{ item.name }}</span>
            <span>{{ item.price }}</span>
        </div>
        {% endfor %}

        <div class="total">
            <span>ВСЬОГО:</span>
            <span>{{ total }} грн</span>
        </div>

        <a href="/pay_table/{{ table }}" class="btn-pay" onclick="return confirm('Підтверджуєте оплату? Всі замовлення столу будуть закриті.');">
            💵 ОПЛАТИТИ (Закрити стіл)
        </a>
        
        <a href="/waiter" class="btn-back">← Назад</a>
    </div>

</body>
</html>
