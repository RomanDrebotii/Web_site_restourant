<!DOCTYPE html>
<html>
<head>
    <title>Редагування користувача</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f9; }
        form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        label { font-weight: bold; color: #333; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .cancel { background: #95a5a6; margin-top: 10px; display: block; text-align: center; text-decoration: none; padding: 10px; border-radius: 5px; color: white; font-size: 0.9em;}
    </style>
</head>
<body>
    <form method="POST">
        <h2 style="text-align: center; margin-top: 0;">✏️ Редагування</h2>
        
        <label>Ім'я:</label>
        <input type="text" name="name" value="{{ user.name }}" required>

        <label>Логін (Email):</label>
        <input type="text" name="login" value="{{ user.login }}" required>

        <button type="submit">Зберегти зміни</button>
        <a href="/admin" class="cancel">Скасувати</a>
    </form>
</body>
</html>
